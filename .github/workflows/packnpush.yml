name: Build and Publish Chocolatey Package (API Key)

on:
  push:
    branches: [ main ]   # Change to your branch(es)
  workflow_dispatch:

jobs:
  build_and_publish:
    runs-on: windows-latest 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Setup Environment (Install Chocolatey)
      - name: Install Chocolatey Package Manager
        run: |
          powershell -ExecutionPolicy Bypass -Command "iex ((New-Object Net.WebClient).DownloadString('https://chocolatey.org/install.ps1'))"
      #2. Set APIKEY
      - name: Set APIKEY
        run: choco apikey add -k ${{secrets.CHOCO_API_KEY}} -s https://push.chocolatey.org
      # 3. Build Package (*** IMPORTANT: CUSTOMIZE THIS SECTION ***)
      - name: Build Package
        # --- START CUSTOMIZATION AREA ---
        # This command builds and packages the contents of the repository root (.).
        # Change this if your source code is in a specific subdirectory.
        run: choco pack unifiidentity.nuspec
        # --- END CUSTOMIZATION AREA ---

      # 4. Publish Package using API Key
      - name: Publish to Chocolatey Repository
        run: choco push $(ls *.nupkg) --source https://push.chocolatey.org/

      - name: Success Message
        run: echo "✅ Successfully built and published package version ${{ github.sha }}."
